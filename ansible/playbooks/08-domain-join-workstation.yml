---
# =============================================================================
# Playbook: 08-domain-join-workstation.yml
# Purpose : Joindre G1-workstation au domaine g1soc.local + authentification AD
# Target  : g1-workstation (192.168.10.99)
# Author  : Aymerick Victoire
# Méthode : net ads join (et NON realm join)
#   realm join échoue : CONSTRAINT_ATT_TYPE userAccountControl sur Windows 2016+
#   net ads join avec smb.conf ADS fonctionne.
# Prérequis : AD opérationnel (g1soc.local), NTP synchronisé (Kerberos ±5 min)
# Variables : join_user / join_password à passer en --extra-vars ou vault
# =============================================================================

- name: Domain join G1-workstation
  hosts: g1-workstation
  become: true

  vars:
    join_user: amartin
    join_password: "{{ vault_ad_join_password }}"   # ansible-vault

  tasks:

    - name: Installer les paquets de jonction au domaine
      apt:
        name:
          - realmd
          - sssd
          - sssd-tools
          - libnss-sss
          - libpam-sss
          - adcli
          - samba-common-bin
          - krb5-user
          - packagekit
          - oddjob
          - oddjob-mkhomedir
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Déployer /etc/krb5.conf
      template:
        src: ../templates/krb5.conf.j2
        dest: /etc/krb5.conf
        owner: root
        group: root
        mode: '0644'

    - name: Déployer /etc/samba/smb.conf
      template:
        src: ../templates/smb.conf.j2
        dest: /etc/samba/smb.conf
        owner: root
        group: root
        mode: '0644'

    - name: Déployer /etc/sssd/sssd.conf (chmod 600)
      template:
        src: ../templates/sssd.conf.j2
        dest: /etc/sssd/sssd.conf
        owner: root
        group: root
        mode: '0600'
      notify: Redémarrer sssd

    # NTP est un prérequis Kerberos — vérifier le décalage horaire
    - name: Vérifier la synchronisation horaire avec le DC
      command: chronyc tracking
      register: chrony_status
      changed_when: false
      failed_when: false

    - name: Vérifier si déjà membre du domaine
      command: net ads testjoin
      register: testjoin
      changed_when: false
      failed_when: false

    - name: Joindre le domaine via net ads join
      command: net ads join -U {{ join_user }}%{{ join_password }}
      register: join_result
      no_log: true
      when: "'Join is OK' not in testjoin.stdout"
      changed_when: "'Joined' in join_result.stdout"

    - name: Activer la création automatique des home directories (pam_mkhomedir)
      command: pam-auth-update --enable mkhomedir
      changed_when: false

    - name: Activer et démarrer sssd
      systemd:
        name: sssd
        enabled: true
        state: started
        daemon_reload: true

    # ── Vérification : un utilisateur AD est résolu localement ──────────────
    - name: Vérifier la résolution d'un utilisateur AD (id amartin)
      command: id {{ join_user }}
      register: id_check
      changed_when: false
      failed_when: id_check.rc != 0

    - name: Afficher le résultat
      debug:
        msg: "Domain join OK — {{ join_user }} résolu : {{ id_check.stdout }}"

  handlers:
    - name: Redémarrer sssd
      systemd:
        name: sssd
        state: restarted
