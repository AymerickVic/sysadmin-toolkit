---
# =============================================================================
# Playbook: 03-configure-rsyslog.yml
# Purpose : Configure rsyslog on Linux servers to forward logs to central SIEM
# Target  : linux_servers
# Author  : Aymerick Victoire
# =============================================================================

- name: Configure rsyslog for centralized logging
  hosts: linux_servers
  become: true
  gather_facts: true

  vars:
    syslog_server_ip: "192.168.10.31"   # SRV-SYSLOG
    syslog_server_port: 514
    syslog_protocol: "@@"               # @@ = TCP, @ = UDP
    log_facility: "*.*"                 # All facilities and severities

  tasks:

    # ── Ensure rsyslog is installed ───────────────────────────────
    - name: Install rsyslog
      apt:
        name: rsyslog
        state: present

    # ── Deploy forwarding config ──────────────────────────────────
    - name: Configure rsyslog remote forwarding
      copy:
        dest: /etc/rsyslog.d/99-remote-forward.conf
        content: |
          # Remote log forwarding — managed by Ansible
          # Destination: {{ syslog_server_ip }}:{{ syslog_server_port }} (TCP)
          #
          # Template: RFC5424 with hostname and app-name
          $template RemoteLogs,"<%pri%>1 %timestamp:::date-rfc3339% %hostname% %app-name% %procid% %msgid% %msg%\n"

          # Forward everything to central syslog server
          {{ log_facility }} {{ syslog_protocol }}{{ syslog_server_ip }}:{{ syslog_server_port }};RemoteLogs

          # Also keep local copy
          {{ log_facility }} /var/log/syslog
        mode: '0644'
      notify: Restart rsyslog

    # ── Ensure auth logs are forwarded separately ─────────────────
    - name: Configure auth log forwarding (high-priority)
      copy:
        dest: /etc/rsyslog.d/50-auth-forward.conf
        content: |
          # Auth/authpriv forwarding — critical for SIEM correlation
          auth,authpriv.* {{ syslog_protocol }}{{ syslog_server_ip }}:{{ syslog_server_port }}
        mode: '0644'
      notify: Restart rsyslog

    # ── Tune rsyslog main config (performance + reliability) ──────
    - name: Configure rsyslog global options
      blockinfile:
        path: /etc/rsyslog.conf
        insertafter: "^#### GLOBAL DIRECTIVES ####"
        block: |
          # Queue settings for reliable forwarding (disk-assisted)
          $ActionQueueType LinkedList
          $ActionQueueFileName fwdRule1
          $ActionResumeRetryCount -1
          $ActionQueueSaveOnShutdown on
          # Rate limiting
          $SystemLogRateLimitInterval 2
          $SystemLogRateLimitBurst 500
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
      notify: Restart rsyslog

    # ── Enable and restart ────────────────────────────────────────
    - name: Enable rsyslog
      systemd:
        name: rsyslog
        enabled: true

    - name: Verify rsyslog configuration syntax
      command: rsyslogd -N1 -f /etc/rsyslog.conf
      register: rsyslog_check
      changed_when: false
      failed_when: rsyslog_check.rc != 0

    - name: Display rsyslog config check result
      debug:
        msg: "rsyslog config OK: {{ rsyslog_check.stderr_lines | last }}"

  handlers:
    - name: Restart rsyslog
      systemd:
        name: rsyslog
        state: restarted
