---
# Ansible Inventory — Lab Infrastructure
# Structure mirrors the fil rouge lab (B3 CPI)
# Adapt IP addresses and credentials to your environment

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3

  children:

    # ── Domain Controllers ────────────────────────────────────────
    domain_controllers:
      hosts:
        DC01:
          ansible_host: 192.168.10.10
          ansible_user: Administrateur
          ansible_connection: winrm
          ansible_winrm_transport: kerberos
          ansible_winrm_server_cert_validation: ignore
          server_role: primary_dc

    # ── Windows Member Servers ────────────────────────────────────
    windows_servers:
      hosts:
        SRV-FILE01:
          ansible_host: 192.168.10.20
          ansible_user: Administrateur
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          server_role: fileserver

        SRV-GLPI01:
          ansible_host: 192.168.10.21
          ansible_user: Administrateur
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          server_role: itsm

    # ── Linux Servers ─────────────────────────────────────────────
    linux_servers:
      hosts:
        SRV-WAZUH:
          ansible_host: 192.168.10.30
          ansible_user: ansible
          ansible_ssh_private_key_file: ~/.ssh/ansible_ed25519
          server_role: siem

        SRV-SYSLOG:
          ansible_host: 192.168.10.31
          ansible_user: ansible
          ansible_ssh_private_key_file: ~/.ssh/ansible_ed25519
          server_role: log_collector

    # ── Workstations ──────────────────────────────────────────────
    workstations:
      hosts:
        CLIENT01:
          ansible_host: 192.168.20.10
          ansible_user: Administrateur
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore

    # ── pfSense ───────────────────────────────────────────────────
    # pfSense is managed via its REST API / web UI — not via SSH by default
    # firewall:
    #   hosts:
    #     PFSENSE01:
    #       ansible_host: 192.168.1.1

    # ── Logical groups for playbook targeting ─────────────────────
    all_servers:
      children:
        domain_controllers:
        windows_servers:
        linux_servers:

    all_windows:
      children:
        domain_controllers:
        windows_servers:
        workstations:
